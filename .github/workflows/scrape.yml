name: Automated Siranap Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install & Run Scraper
        run: |
          uv pip install --system -r requirements.txt &
          INSTALL_PID=$!
          wait $INSTALL_PID
          python -u Scrapper.py

      - name: Save CSV Backup to GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add siranap_data.csv
          git diff --cached --quiet && echo "No data changes" || git commit -m "Auto-update SIRANAP CSV Backup" && git push
