name: Automated Siranap Scraper

on:
  schedule:
    # Berjalan pada jam 9, 11, 13, 15, 17 WIB
    - cron: '0 9,11,13,15,17 * * *'
      timezone: Asia/Jakarta
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install google-chrome-stable

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Execute Scraper
        run: |
          sudo rm -f /usr/bin/chromedriver
          sudo rm -f /usr/local/bin/chromedriver
          sudo rm -f /usr/local/share/chrome_driver/chromedriver
          # Menggunakan -u agar log terlihat secara real-time
          python -u scraper.py

      - name: Save CSV to GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add siranap_data.csv
          git commit -m "Update SIRANAP data (Every 2 Hours)" || echo "No data changes"
          git push
