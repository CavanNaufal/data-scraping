name: Automated Siranap Scraper

on:
  #schedule:
    # - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Install & Run Scraper
        env:
          POWER_BI_URL: ${{secrets.POWER_BI_URL}}
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt
          python -u scraper_hospital.py

      - name: Save CSV Backup to GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add siranap_data.csv
          git diff --cached --quiet && echo "No data changes" || git commit -m "Auto-update SIRANAP CSV Backup" && git push
