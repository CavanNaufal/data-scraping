name: Automated Siranap Scraper

on:
  schedule:
    # Jam 8 WIB, 12 WIB, 16 WIB (= 01, 05, 09 UTC)
    - cron: '0 1 * * *'
    - cron: '0 5 * * *'
    - cron: '0 9 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  UV_CACHE_DIR: /tmp/uv-cache

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "requirements*.txt"

      - name: Install Dependencies
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -r requirements.txt

      - name: Run Scraper
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        run: |
          source .venv/bin/activate
          python -u scraper_hospitals.py

      - name: Save CSV Backup to GitHub
        if: success()
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add siranap_data.csv
          git diff --cached --quiet && echo "No data changes" || git commit -m "Auto-update SIRANAP CSV Backup" && git push
