name: Automated Siranap Scraper

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Menghindari peringatan/error Node.js usang
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Mengaktifkan cache agar instalasi secepat kilat

      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      - name: Execute Scraper
        run: |
          # Langsung jalankan Python dengan output real-time (-u)
          python -u scraper.py

      - name: Save CSV Backup to GitHub
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add siranap_data.csv
          git commit -m "Auto-update SIRANAP CSV Backup" || echo "No data changes"
          git push
